name: 部署 TaskHub 到 Github Pages

on:
  push:
    branches:
      - main  # 推送到 main 分支自动部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖 & 打包
        run: |
          npm install
          npm run build

      - name: 部署到 Github Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          author: "自动部署"
          email: "deploy@gitee.com"
          folder: "dist"